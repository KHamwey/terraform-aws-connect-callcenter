name: Terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: us-east-1
  TF_VAR_region: us-east-1
  TF_VAR_instance_alias: kwade-callcenter-demo
  TF_VAR_agent_email: kylehamwey2010@gmail.com
  TF_VAR_notification_email: kylehamwey2010@gmail.com
  TF_VAR_ses_from_email: kylehamwey2010@gmail.com
  TF_VAR_lex_bot_name: KylesWebsiteBot
  TF_VAR_lex_bot_version: V2
  TF_VAR_lex_v2_connect_bot_alias_arn: arn:aws:lex:us-east-1:528757806846:bot-alias/YPUBHWXZVM/TSTALIASID
  TF_VAR_lex_v2_web_chat_bot_alias_arn: arn:aws:lex:us-east-1:528757806846:bot-alias/JLUYWTIOVK/TSTALIASID

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=connect-callcenter/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -input=false -no-color -out=tfplan \
            -var="agent_password=${{ secrets.TF_VAR_agent_password }}"
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            let body = '#### Terraform plan :x: failed\n\n';
            if (process.env.PLAN_OUTCOME === 'success') {
              const plan = execSync('terraform show -no-color tfplan', { encoding: 'utf8' });
              const max = 60000;
              const trimmed = plan.length > max ? plan.slice(0, max) + '\n\n...(truncated)' : plan;
              body = `#### Terraform plan :white_check_mark:\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${trimmed}\n\`\`\`\n\n</details>`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply -input=false -auto-approve tfplan
